name: Docker CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and run Docker container
        run: |
          docker build -t my-app .
          docker stop my-app || true
          docker rm my-app || true
          docker run -d --name my-app -p 8080:80 my-app
